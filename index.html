<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Findes Precríticos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ═══ Design Tokens ═══ */
    :root {
      --ff-display: 'Instrument Serif', Georgia, serif;
      --ff-body: 'Outfit', system-ui, sans-serif;
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);

      --bg: #faf8f3;
      --bg-raised: #f3efe8;
      --bg-inset: #ece7de;
      --tx: #1c1814;
      --tx-2: #5e564b;
      --tx-3: #918778;
      --border: #ddd7cc;
      --wine: #8b2635;
      --wine-soft: #c4546a;
      --wine-bg: #f7ecee;
      --gold: #a8872a;
      --gold-bg: #faf4e4;
      --teal: #3a7a5f;
      --blue: #3d6b8e;
      --purple: #6b4d8a;
    }

    [data-theme="dark"] {
      --bg: #13110f;
      --bg-raised: #1d1a16;
      --bg-inset: #252220;
      --tx: #e4ded4;
      --tx-2: #a39a8d;
      --tx-3: #6e665c;
      --border: #302c27;
      --wine: #d4647a;
      --wine-soft: #e8899a;
      --wine-bg: #2a1a1e;
      --gold: #d4b24a;
      --gold-bg: #24200f;
      --teal: #5cb88a;
      --blue: #6ab0db;
      --purple: #9d7ec2;
    }

    /* ═══ Bulma Overrides ═══ */
    html { background: var(--bg); }
    body {
      font-family: var(--ff-body);
      background: var(--bg);
      color: var(--tx);
      -webkit-font-smoothing: antialiased;
      padding-top: 3.5rem;
      transition: background .35s var(--ease-out-quart), color .35s var(--ease-out-quart);
    }
    .title, .subtitle { color: var(--tx) !important; }
    a { color: var(--wine); transition: color .15s; }
    a:hover { color: var(--wine-soft); }

    /* ═══ Navbar ═══ */
    .navbar.is-fixed-top {
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border);
      min-height: 3.5rem;
      box-shadow: none;
      transition: background .35s var(--ease-out-quart), border-color .35s var(--ease-out-quart);
    }
    .navbar-brand > .navbar-item {
      font-family: var(--ff-display);
      font-size: 1.3rem;
      color: var(--wine) !important;
      gap: .35rem;
      padding-left: 0;
    }
    .navbar-brand > .navbar-item:hover { background: transparent !important; }
    .navbar-item, .navbar-link {
      font-family: var(--ff-body);
      color: var(--tx-2) !important;
      font-size: .88rem;
      font-weight: 500;
      letter-spacing: .01em;
    }
    .navbar-item:hover, .navbar-item:focus { background: transparent !important; color: var(--wine) !important; }
    .navbar-item.is-active-page { color: var(--wine) !important; font-weight: 600; }
    .navbar-burger { color: var(--tx); }
    .navbar-burger:hover { background: transparent; color: var(--wine); }
    .navbar-menu {
      background: var(--bg-raised) !important;
      box-shadow: none !important;
    }
    @media screen and (max-width: 1023px) {
      .navbar-menu { border-top: 1px solid var(--border); padding: .5rem 0; }
      .navbar > .container { padding-left: 1rem; padding-right: 1rem; }
    }

    /* Search in navbar */
    .search-wrap { position: relative; width: 220px; }
    @media screen and (max-width: 1023px) { .search-wrap { width: 100%; } }
    .search-wrap .input {
      background: var(--bg);
      border-color: var(--border);
      color: var(--tx);
      font-family: var(--ff-body);
      font-size: .85rem;
      height: 2.1rem;
      box-shadow: none;
      border-radius: 6px;
      transition: border-color .15s;
    }
    .search-wrap .input::placeholder { color: var(--tx-3); }
    .search-wrap .input:focus { border-color: var(--wine); box-shadow: 0 0 0 2px var(--wine-bg); }
    .search-results {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--bg-raised); border: 1px solid var(--border);
      border-radius: 8px; max-height: 55vh; overflow-y: auto;
      z-index: 100; box-shadow: 0 12px 40px rgba(0,0,0,.15);
      display: none;
    }
    .search-results.open { display: block; }
    .sr-item {
      padding: .55rem .75rem; cursor: pointer;
      display: flex; align-items: center; gap: .6rem;
      border-bottom: 1px solid var(--border); transition: background .1s;
    }
    .sr-item:last-child { border-bottom: none; }
    .sr-item:hover, .sr-item.selected { background: var(--bg-inset); }
    .sr-item img { width: 30px; height: 45px; object-fit: cover; border-radius: 3px; flex-shrink: 0; }
    .sr-placeholder { width: 30px; height: 45px; background: var(--bg-inset); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: .6rem; }
    .sr-text { flex: 1; min-width: 0; }
    .sr-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: .88rem; color: var(--tx); }
    .sr-title mark { background: var(--gold-bg); color: var(--gold); border-radius: 2px; padding: 0 2px; }
    .sr-sub { font-size: .72rem; color: var(--tx-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sr-type { font-size: .6rem; padding: .15rem .4rem; border-radius: 2rem; flex-shrink: 0; color: #fff; text-transform: uppercase; letter-spacing: .3px; font-weight: 600; }
    .sr-type.pelicula { background: var(--wine); }
    .sr-type.persona { background: var(--teal); }
    .sr-type.lugar { background: var(--blue); }
    .sr-type.finde { background: var(--tx-3); }
    .sr-type.director { background: var(--purple); }

    /* Theme toggle */
    .theme-toggle {
      background: none; border: none; cursor: pointer;
      color: var(--tx-2); font-size: 1.1rem; padding: .35rem;
      border-radius: 6px; transition: color .15s, background .15s;
      line-height: 1; display: flex; align-items: center;
    }
    .theme-toggle:hover { color: var(--wine); background: var(--bg-inset); }
    [data-theme="dark"] .theme-toggle .icon-sun { display: inline; }
    [data-theme="dark"] .theme-toggle .icon-moon { display: none; }
    [data-theme="light"] .theme-toggle .icon-sun { display: none; }
    [data-theme="light"] .theme-toggle .icon-moon { display: inline; }

    /* ═══ Main Content ═══ */
    #view { min-height: 70vh; }
    .main-section { padding: 2rem 0 3rem; }

    /* ═══ Breadcrumb ═══ */
    .breadcrumb {
      font-size: .85rem;
      margin-bottom: 1.25rem !important;
    }
    .breadcrumb a { color: var(--tx-3) !important; }
    .breadcrumb a:hover { color: var(--wine) !important; }
    .breadcrumb li.is-active a { color: var(--tx-2) !important; }
    .breadcrumb li + li::before { color: var(--tx-3) !important; }

    /* ═══ Hero / Home ═══ */
    .home-hero {
      padding: 3rem 0 2.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }
    .home-hero .display-title {
      font-family: var(--ff-display);
      font-size: clamp(2.2rem, 1.5rem + 3.5vw, 4.2rem);
      line-height: 1.05;
      color: var(--tx);
      margin-bottom: .35rem;
      letter-spacing: -.02em;
    }
    .home-hero .display-sub {
      font-family: var(--ff-display);
      font-style: italic;
      font-size: clamp(1rem, 0.8rem + 1vw, 1.4rem);
      color: var(--tx-3);
    }

    /* Level stats */
    .level.stats-level { margin: 2rem 0; }
    .stats-level .level-item { flex-direction: column; }
    .stats-level .stat-num {
      font-family: var(--ff-display);
      font-size: clamp(2rem, 1.5rem + 2vw, 3.2rem);
      line-height: 1;
      color: var(--wine);
      font-variant-numeric: tabular-nums;
      transition: color .15s;
    }
    .stats-level a:hover .stat-num { color: var(--wine-soft); }
    .stats-level a:hover .stat-label { color: var(--wine); }
    .stats-level .stat-label {
      font-size: .78rem;
      color: var(--tx-3);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 500;
      margin-top: .2rem;
    }

    /* ═══ Cards ═══ */
    .card {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      box-shadow: none;
      border-radius: 8px;
      transition: border-color .2s var(--ease-out-quart), transform .2s var(--ease-out-quart);
    }
    .card:hover {
      border-color: var(--wine);
      transform: translateY(-2px);
    }
    .card .card-content { padding: 1.15rem; }
    .card-header {
      background: transparent;
      box-shadow: none;
      border-bottom: 1px solid var(--border);
    }
    .card-header-title {
      color: var(--tx) !important;
      font-family: var(--ff-display);
      font-size: 1.1rem;
      font-weight: 400;
      padding: .85rem 1.15rem;
    }
    .card-footer { border-top: 1px solid var(--border); }
    .card-footer-item {
      color: var(--tx-2) !important;
      font-size: .82rem;
      padding: .65rem;
    }
    .card-footer-item:hover { color: var(--wine) !important; background: var(--bg-inset); }

    /* Finde cards on home */
    .finde-card-link {
      text-decoration: none; color: inherit; display: block;
    }
    .finde-card-link .card-content {
      display: flex; align-items: center; gap: .85rem;
    }
    .finde-num {
      font-family: var(--ff-display);
      font-size: 1.5rem;
      color: var(--wine);
      min-width: 2.8rem;
      text-align: center;
      flex-shrink: 0;
      line-height: 1;
    }
    .finde-info { flex: 1; min-width: 0; }
    .finde-date { font-weight: 600; font-size: .92rem; }
    .finde-lugar { font-size: .8rem; color: var(--tx-3); margin-top: .1rem; }
    .finde-card-link .card-content {
      display: flex; align-items: center; gap: .85rem;
      overflow: visible;
    }
    .finde-pelis { flex-shrink: 0; font-size: .78rem; color: var(--tx-3); white-space: nowrap; }

    /* ═══ Panels (person movie lists) ═══ */
    .panel {
      border-radius: 8px;
      border: 1px solid var(--border);
      box-shadow: none;
      background: var(--bg-raised);
      font-size: .92rem;
    }
    .panel-heading {
      background: var(--bg-inset) !important;
      color: var(--tx) !important;
      font-family: var(--ff-display);
      font-size: 1.05rem;
      font-weight: 400;
      border-bottom: 1px solid var(--border);
      border-radius: 8px 8px 0 0;
      padding: .7rem 1rem;
    }
    .panel-heading a { color: var(--wine) !important; text-decoration: none; }
    .panel-heading a:hover { text-decoration: underline; }
    .panel-block {
      border-bottom: 1px solid var(--border);
      padding: .55rem 1rem;
      color: var(--tx);
      font-size: .88rem;
    }
    .panel-block:last-child { border-bottom: none; border-radius: 0 0 8px 8px; }
    .panel-block a { color: var(--wine); text-decoration: none; }
    .panel-block a:hover { text-decoration: underline; }
    .panel-block .panel-icon { color: var(--tx-3); margin-right: .5rem; }
    .peli-es { opacity: .5; font-size: .85em; }

    /* ═══ Tags ═══ */
    .tag.is-lugar {
      background: var(--blue);
      color: #fff;
      font-size: .72rem;
      font-weight: 500;
      border-radius: 2rem;
      cursor: pointer;
      transition: background .15s;
    }
    .tag.is-lugar:hover { background: var(--wine); color: #fff; }
    .tag.is-genre {
      background: var(--bg-inset);
      color: var(--tx-2);
      font-size: .72rem;
      border-radius: 2rem;
    }

    /* ═══ Tabs ═══ */
    .tabs {
      border-bottom-color: var(--border);
      margin-bottom: 1.5rem !important;
    }
    .tabs a {
      color: var(--tx-3) !important;
      border-bottom-color: transparent !important;
      font-weight: 500;
      font-size: .88rem;
    }
    .tabs a:hover { color: var(--wine) !important; border-bottom-color: var(--wine) !important; }
    .tabs li.is-active a {
      color: var(--wine) !important;
      border-bottom-color: var(--wine) !important;
      font-weight: 600;
    }

    /* ═══ Messages (plot, info) ═══ */
    .message {
      background: var(--bg-raised);
      border-radius: 8px;
    }
    .message.is-wine { border-left: 4px solid var(--wine); }
    .message.is-wine .message-body {
      background: var(--wine-bg);
      color: var(--tx);
      border: none;
      font-size: .9rem;
      line-height: 1.65;
      padding: 1rem 1.25rem;
    }

    /* ═══ Movie Detail ═══ */
    .peli-poster-img {
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,.12);
      width: 100%;
      max-width: 240px;
      margin-bottom: .5rem;
    }
    .peli-title {
      font-family: var(--ff-display);
      font-size: clamp(1.6rem, 1.2rem + 2vw, 2.6rem);
      line-height: 1.1;
      margin-bottom: .4rem;
      letter-spacing: -.01em;
    }
    .peli-meta-line {
      font-size: .88rem;
      color: var(--tx-2);
      margin-bottom: .5rem;
      font-style: italic;
      font-family: var(--ff-display);
    }
    .peli-rating {
      display: inline-flex; align-items: center; gap: .35rem;
      background: var(--gold-bg); color: var(--gold);
      padding: .3rem .7rem; border-radius: 4px;
      font-weight: 700; font-size: .85rem;
      text-decoration: none; transition: opacity .15s;
    }
    .peli-rating:hover { opacity: .85; color: var(--gold); }

    /* ═══ Persona cards ═══ */
    .persona-card .card-content { display: flex; align-items: center; gap: .85rem; }
    .persona-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--wine-bg);
      color: var(--wine);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--ff-display);
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    [data-theme="dark"] .persona-avatar { background: var(--wine-bg); color: var(--wine-soft); }

    /* ═══ Page Heading ═══ */
    .page-heading {
      font-family: var(--ff-display);
      font-size: clamp(1.6rem, 1.2rem + 2vw, 2.8rem);
      line-height: 1.1;
      margin-bottom: .6rem;
      letter-spacing: -.02em;
    }
    .page-sub {
      font-size: .9rem;
      color: var(--tx-2);
      margin-bottom: 1.5rem;
    }
    .page-sub a { color: var(--wine); }

    /* ═══ Film List (all movies) ═══ */
    .film-row {
      display: flex; align-items: center; gap: .7rem;
      padding: .5rem 0;
      border-bottom: 1px solid var(--border);
    }
    .film-row:last-child { border-bottom: none; }
    .film-poster-sm {
      width: 32px; height: 48px;
      object-fit: cover; border-radius: 3px;
      flex-shrink: 0;
    }
    .film-poster-ph {
      width: 32px; height: 48px;
      background: var(--bg-inset);
      border-radius: 3px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .55rem; color: var(--tx-3);
    }
    .film-row-body { flex: 1; min-width: 0; }
    .film-row-title {
      font-weight: 500; font-size: .88rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .film-row-title a { text-decoration: none; color: var(--tx); }
    .film-row-title a:hover { color: var(--wine); }
    .film-row-sub { font-size: .75rem; color: var(--tx-3); }
    .film-row-sub a { color: var(--tx-3); text-decoration: none; }
    .film-row-sub a:hover { color: var(--wine); }

    /* ═══ Entrance Animation ═══ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .stagger > * {
      opacity: 0;
      animation: fadeUp .45s var(--ease-out-quart) forwards;
      animation-delay: calc(var(--i, 0) * 40ms);
    }
    @media (prefers-reduced-motion: reduce) {
      .stagger > * { animation: none; opacity: 1; }
    }

    /* ═══ Dropdown (Bulma) ═══ */
    .dropdown-content { background: var(--bg-raised); box-shadow: 0 8px 24px rgba(0,0,0,.1); }
    .dropdown-item { color: var(--tx); font-size: .88rem; }
    .dropdown-item:hover { background: var(--bg-inset); color: var(--wine); }

    /* ═══ Menu (Bulma) ═══ */
    .menu-label { color: var(--tx-3) !important; font-weight: 600; letter-spacing: .05em; }
    .menu-list a { color: var(--tx-2); border-radius: 6px; }
    .menu-list a:hover { background: var(--bg-inset); color: var(--wine); }
    .menu-list a.is-active { background: var(--wine-bg); color: var(--wine); }

    /* ═══ Responsive ═══ */
    @media screen and (max-width: 768px) {
      /* Breathe — more horizontal padding on mobile */
      .container { padding-left: 1.25rem !important; padding-right: 1.25rem !important; }
      .main-section { padding: 1.25rem 0 2rem; }
      .home-hero { padding: 1.75rem 0 1.5rem; }
      .columns.finde-panels { gap: .5rem; }
      /* Cards: slightly more internal space */
      .card .card-content { padding: 1rem; }
      .panel-heading { padding: .7rem 1rem; }
      .panel-block { padding: .6rem 1rem; }
      /* Stats: tighter on tiny screens but still readable */
      .stats-level { gap: .5rem; }
      .stats-level .stat-num { font-size: 1.8rem; }
      /* Poster column: center & breathe */
      .peli-poster-img { max-width: 180px; }
      /* Breadcrumb nudge */
      .breadcrumb { margin-bottom: 1rem !important; }
    }
    @media screen and (max-width: 400px) {
      .container { padding-left: 1rem !important; padding-right: 1rem !important; }
    }

    /* ═══ Filter input ═══ */
    .filter-input .input {
      background: var(--bg-raised);
      border-color: var(--border);
      color: var(--tx);
      font-family: var(--ff-body);
      border-radius: 6px;
      box-shadow: none;
    }
    .filter-input .input::placeholder { color: var(--tx-3); }
    .filter-input .input:focus { border-color: var(--wine); box-shadow: 0 0 0 2px var(--wine-bg); }

    /* ═══ Scrollbar ═══ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--tx-3); }
  </style>
</head>
<body>
  <!-- ═══ Navbar ═══ -->
  <nav class="navbar is-fixed-top" role="navigation" aria-label="main navigation">
    <div class="container">
      <div class="navbar-brand">
        <a class="navbar-item" href="#">🎬 Findes Precríticos</a>
        <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navMenu">
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </a>
      </div>
      <div id="navMenu" class="navbar-menu">
        <div class="navbar-start" id="main-nav">
          <a class="navbar-item" href="#" data-page="">Inicio</a>
          <a class="navbar-item" href="#lugares" data-page="lugares">Lugares</a>
          <a class="navbar-item" href="#personas" data-page="personas">Personas</a>
          <a class="navbar-item" href="#peliculas" data-page="peliculas">Películas</a>
          <a class="navbar-item" href="#directores" data-page="directores">Directores</a>
        </div>
        <div class="navbar-end">
          <div class="navbar-item">
            <div class="search-wrap">
              <input class="input" type="search" id="global-search" placeholder="Buscar película, persona..." autocomplete="off">
              <div class="search-results" id="search-results"></div>
            </div>
          </div>
          <div class="navbar-item">
            <button class="theme-toggle" id="theme-toggle" title="Cambiar tema">
              <span class="icon-moon">🌙</span>
              <span class="icon-sun">☀️</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- ═══ Main View ═══ -->
  <div id="view"></div>

  <script>
    let DATA = [];
    const PELI_CACHE = {};

    /* ── Theme ── */
    (function initTheme() {
      const saved = localStorage.getItem('fp-theme');
      if (saved) {
        document.documentElement.dataset.theme = saved;
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.dataset.theme = 'dark';
      }
    })();

    document.getElementById('theme-toggle').addEventListener('click', () => {
      const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('fp-theme', next);
    });

    /* ── Navbar burger ── */
    document.querySelector('.navbar-burger').addEventListener('click', function () {
      this.classList.toggle('is-active');
      document.getElementById(this.dataset.target).classList.toggle('is-active');
    });

    /* ── Init ── */
    async function init() {
      const res = await fetch('data.json');
      DATA = await res.json();
      const slugs = new Set();
      for (const f of DATA) for (const p of f.personas) for (const m of p.peliculas) {
        if (typeof m !== 'string' && m.slug) slugs.add(m.slug);
      }
      await Promise.all([...slugs].map(s => loadPeli(s)));
      route();
      window.addEventListener('hashchange', route);
      buildSearchIndex();
      setupSearch();
    }

    async function loadPeli(slug) {
      if (PELI_CACHE[slug]) return PELI_CACHE[slug];
      try {
        const res = await fetch(`peliculas/${slug}.json`);
        if (res.ok) { PELI_CACHE[slug] = await res.json(); return PELI_CACHE[slug]; }
      } catch(e) {}
      return null;
    }

    function peliDisplayTitle(peli, slug) {
      const p = slug ? PELI_CACHE[slug] : null;
      if (!p) return typeof peli === 'string' ? peli : peli.titulo;
      const orig = p.titulo_original || p.titulo;
      const es = p.titulo_es || p.titulo;
      const year = p.year ? ` (${p.year})` : '';
      if (orig.toLowerCase() === es.toLowerCase()) return `${orig}${year}`;
      return `${orig} <span class="peli-es">(${es})</span>${year}`;
    }

    function peliLink(peli) {
      const t = typeof peli === 'string' ? peli : peli.titulo;
      const s = typeof peli === 'string' ? null : peli.slug;
      if (!s) return t;
      return `<a href="#pelicula/${s}">${peliDisplayTitle(peli, s)}</a>`;
    }

    /* ── Routing ── */
    function route() {
      const hash = location.hash.slice(1);
      const seg = hash.split('/')[0] || '';
      const pageMap = { finde: '', persona: 'personas', pelicula: 'peliculas', lugar: 'lugares', director: 'directores' };
      const page = pageMap[seg] !== undefined ? pageMap[seg] : seg;
      document.querySelectorAll('#main-nav .navbar-item').forEach(a => {
        a.classList.toggle('is-active-page', a.dataset.page === page);
      });
      // Close mobile menu on navigation
      document.querySelector('.navbar-burger').classList.remove('is-active');
      document.getElementById('navMenu').classList.remove('is-active');

      if (hash.startsWith('finde/')) renderFinde(parseInt(hash.split('/')[1]));
      else if (hash.startsWith('pelicula/')) renderPelicula(hash.split('/')[1]);
      else if (hash.startsWith('persona/')) renderPersona(decodeURIComponent(hash.split('/')[1]));
      else if (hash.startsWith('lugar/')) renderLugar(decodeURIComponent(hash.split('/')[1]));
      else if (hash.startsWith('director/')) renderDirector(decodeURIComponent(hash.split('/').slice(1).join('/')));
      else if (hash === 'lugares') renderLugares();
      else if (hash === 'personas') renderPersonas();
      else if (hash === 'peliculas') renderPeliculas();
      else if (hash === 'directores') renderDirectores();
      else renderHome();

      window.scrollTo({ top: 0, behavior: 'instant' });
    }

    function lugarTags(lugares) {
      return lugares.map(l =>
        `<a href="#lugar/${encodeURIComponent(l)}"><span class="tag is-lugar">${l}</span></a>`
      ).join(' ');
    }

    function breadcrumb(items) {
      return `<nav class="breadcrumb" aria-label="breadcrumbs"><ul>
        ${items.map((it, i) => i < items.length - 1
          ? `<li><a href="${it.href}">${it.label}</a></li>`
          : `<li class="is-active"><a href="#" aria-current="page">${it.label}</a></li>`
        ).join('')}
      </ul></nav>`;
    }

    function staggerAttrs(items) {
      return items.map((_, i) => `style="--i:${i}"`);
    }

    /* ── HOME ── */
    function renderHome() {
      const totalPelis = DATA.reduce((sum, f) => sum + f.personas.reduce((s, p) => s + p.peliculas.length, 0), 0);
      const allPeople = [...new Set(DATA.flatMap(f => f.personas.map(p => p.nombre)))];
      const allLugares = [...new Set(DATA.flatMap(f => f.lugares))];

      let html = `<section class="main-section"><div class="container">
        <div class="home-hero">
          <div class="display-title">Findes Precríticos</div>
          <div class="display-sub">Un archivo cinematográfico entre amigos, desde 2005</div>
        </div>

        <nav class="level stats-level">
          <a href="#" class="level-item has-text-centered" style="text-decoration:none;color:inherit">
            <div><div class="stat-num">${DATA.length}</div><div class="stat-label">Findes</div></div>
          </a>
          <a href="#peliculas" class="level-item has-text-centered" style="text-decoration:none;color:inherit">
            <div><div class="stat-num">${totalPelis}</div><div class="stat-label">Películas</div></div>
          </a>
          <a href="#personas" class="level-item has-text-centered" style="text-decoration:none;color:inherit">
            <div><div class="stat-num">${allPeople.length}</div><div class="stat-label">Participantes</div></div>
          </a>
          <a href="#lugares" class="level-item has-text-centered" style="text-decoration:none;color:inherit">
            <div><div class="stat-num">${allLugares.length}</div><div class="stat-label">Lugares</div></div>
          </a>
        </nav>

        <div class="tabs is-medium">
          <ul>
            <li class="is-active"><a>Archivo</a></li>
          </ul>
        </div>

        <div class="stagger">
      `;
      for (const [i, f] of DATA.entries()) {
        const npelis = f.personas.reduce((s, p) => s + p.peliculas.length, 0);
        html += `<a href="#finde/${f.numero}" class="finde-card-link" style="--i:${i}">
          <div class="card mb-3">
            <div class="card-content">
              <span class="finde-num">${f.numero}</span>
              <div class="finde-info">
                <div class="finde-date">${f.fecha || '—'}</div>
                <div class="finde-lugar">${f.lugares.join(' · ')}</div>
              </div>
              <span class="finde-pelis">${npelis} películas</span>
            </div>
          </div>
        </a>`;
      }
      html += `</div></div></section>`;
      document.getElementById('view').innerHTML = html;
    }

    /* ── FINDE DETAIL ── */
    function renderFinde(num) {
      const f = DATA.find(d => d.numero === num);
      if (!f) { renderHome(); return; }

      let html = `<section class="main-section"><div class="container">
        ${breadcrumb([{href:'#', label:'Inicio'}, {href:'#', label:`Finde #${f.numero}`}])}
        <h1 class="page-heading">Finde #${f.numero}</h1>
        <div class="page-sub">
          <span style="font-family:var(--ff-display);font-style:italic">${f.fecha || ''}</span>
          &ensp;${lugarTags(f.lugares)}
        </div>

        <div class="columns is-multiline finde-panels stagger">
      `;
      for (const [i, p] of f.personas.entries()) {
        html += `<div class="column is-half-tablet is-one-third-desktop" style="--i:${i}">
          <nav class="panel">
            <p class="panel-heading"><a href="#persona/${encodeURIComponent(p.nombre)}">${p.nombre}</a></p>
            ${p.peliculas.map(m => `<div class="panel-block">
              <span class="panel-icon">🎬</span> ${peliLink(m)}
            </div>`).join('')}
          </nav>
        </div>`;
      }
      html += `</div></div></section>`;
      document.getElementById('view').innerHTML = html;
    }

    /* ── PERSONAS ── */
    function renderPersonas() {
      const stats = {};
      for (const f of DATA) {
        for (const p of f.personas) {
          if (!stats[p.nombre]) stats[p.nombre] = { pelis: 0, findes: 0 };
          stats[p.nombre].pelis += p.peliculas.length;
          stats[p.nombre].findes += 1;
        }
      }

      let html = `<section class="main-section"><div class="container">
        <h1 class="page-heading">Personas</h1>
        <div class="columns is-multiline stagger">
      `;
      const sorted = Object.entries(stats).sort((a, b) => b[1].pelis - a[1].pelis);
      for (const [i, [name, s]] of sorted.entries()) {
        const initial = name.charAt(0).toUpperCase();
        html += `<div class="column is-half-tablet is-one-third-desktop" style="--i:${i}">
          <a href="#persona/${encodeURIComponent(name)}" style="text-decoration:none;color:inherit">
            <div class="card persona-card">
              <div class="card-content">
                <div class="persona-avatar">${initial}</div>
                <div>
                  <div style="font-weight:600;font-size:.95rem">${name}</div>
                  <div style="font-size:.8rem;color:var(--tx-3)">${s.findes} findes · ${s.pelis} películas</div>
                </div>
              </div>
            </div>
          </a>
        </div>`;
      }
      html += `</div></div></section>`;
      document.getElementById('view').innerHTML = html;
    }

    /* ── PERSONA DETAIL ── */
    function renderPersona(nombre) {
      const findes = DATA.filter(f => f.personas.some(p => p.nombre === nombre));
      const totalPelis = findes.reduce((s, f) => s + f.personas.find(p => p.nombre === nombre).peliculas.length, 0);

      let html = `<section class="main-section"><div class="container">
        ${breadcrumb([{href:'#', label:'Inicio'}, {href:'#personas', label:'Personas'}, {href:'#', label: nombre}])}

        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
          <div class="persona-avatar" style="width:56px;height:56px;font-size:1.5rem">${nombre.charAt(0)}</div>
          <div>
            <h1 class="page-heading" style="margin-bottom:.1rem">${nombre}</h1>
            <div class="page-sub" style="margin-bottom:0">${findes.length} findes · ${totalPelis} películas</div>
          </div>
        </div>

        <div class="stagger">
      `;
      for (const [i, f] of findes.entries()) {
        const p = f.personas.find(p => p.nombre === nombre);
        html += `<div style="--i:${i}">
          <nav class="panel mb-4">
            <p class="panel-heading">
              <a href="#finde/${f.numero}">Finde #${f.numero}</a>
              <span style="float:right;font-family:var(--ff-display);font-style:italic;font-size:.88rem;color:var(--tx-3)">${f.fecha || ''}</span>
            </p>
            ${p.peliculas.map(m => `<div class="panel-block">
              <span class="panel-icon">🎬</span> ${peliLink(m)}
            </div>`).join('')}
            <div class="panel-block" style="font-size:.78rem;color:var(--tx-3)">
              ${lugarTags(f.lugares)}
            </div>
          </nav>
        </div>`;
      }
      html += `</div></div></section>`;
      document.getElementById('view').innerHTML = html;
    }

    /* ── PELÍCULAS ── */
    function renderPeliculas() {
      const allFilms = [];
      for (const f of DATA) for (const p of f.personas) for (const m of p.peliculas) {
        const titulo = typeof m === 'string' ? m : m.titulo;
        const slug = typeof m === 'string' ? null : m.slug;
        allFilms.push({ titulo, slug, persona: p.nombre, finde: f.numero, fecha: f.fecha });
      }
      allFilms.sort((a, b) => {
        const pa = a.slug ? PELI_CACHE[a.slug] : null;
        const pb = b.slug ? PELI_CACHE[b.slug] : null;
        const ta = (pa && pa.titulo_original) || a.titulo;
        const tb = (pb && pb.titulo_original) || b.titulo;
        return ta.localeCompare(tb, 'es');
      });

      let html = `<section class="main-section"><div class="container">
        <h1 class="page-heading">Películas <span style="font-family:var(--ff-display);font-style:italic;font-size:.5em;color:var(--tx-3)">${allFilms.length}</span></h1>

        <div class="field filter-input" style="max-width:360px;margin-bottom:1.5rem">
          <div class="control">
            <input class="input" type="search" id="search" placeholder="Filtrar por título...">
          </div>
        </div>

        <div id="films-list">
      `;
      for (const f of allFilms) {
        const peli = f.slug ? PELI_CACHE[f.slug] : null;
        const posterHtml = peli && peli.poster
          ? `<img class="film-poster-sm" src="${peli.poster}" alt="" loading="lazy">`
          : `<div class="film-poster-ph">🎬</div>`;
        const display = f.slug ? peliDisplayTitle(f, f.slug) : f.titulo;
        const link = f.slug ? `<a href="#pelicula/${f.slug}">${display}</a>` : f.titulo;
        html += `<div class="film-row">
          ${posterHtml}
          <div class="film-row-body">
            <div class="film-row-title">${link}</div>
            <div class="film-row-sub"><a href="#persona/${encodeURIComponent(f.persona)}">${f.persona}</a> · <a href="#finde/${f.finde}">#${f.finde}</a></div>
          </div>
        </div>`;
      }
      html += `</div></div></section>`;
      document.getElementById('view').innerHTML = html;

      document.getElementById('search').addEventListener('input', function() {
        const q = this.value.toLowerCase();
        for (const row of document.querySelectorAll('#films-list .film-row')) {
          row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
        }
      });
    }

    /* ── PELÍCULA DETAIL ── */
    async function renderPelicula(slug) {
      const peli = await loadPeli(slug);
      if (!peli) { renderHome(); return; }

      const appearances = [];
      for (const f of DATA) for (const p of f.personas) for (const m of p.peliculas) {
        if (typeof m !== 'string' && m.slug === slug) appearances.push({ finde: f, persona: p.nombre });
      }

      const orig = peli.titulo_original || peli.titulo;
      const es = peli.titulo_es || peli.titulo;
      const displayTitle = orig.toLowerCase() === es.toLowerCase()
        ? orig : `${orig} <span class="peli-es">(${es})</span>`;

      // Find other films by same director(s)
      const directorFilms = {};
      if (peli.director) {
        for (const d of peli.director.split(', ')) {
          directorFilms[d] = [];
          for (const [s, p] of Object.entries(PELI_CACHE)) {
            if (p && s !== slug && p.director && p.director.split(', ').includes(d)) {
              directorFilms[d].push({ slug: s, peli: p });
            }
          }
        }
      }

      // Find films from the same genre
      const genres = peli.genre ? peli.genre.split(', ').map(g => g.trim()) : [];
      const genreFilms = [];
      if (genres.length) {
        const primaryGenre = genres[0];
        for (const [s, p] of Object.entries(PELI_CACHE)) {
          if (p && s !== slug && p.genre && p.genre.includes(primaryGenre)) {
            const shared = genres.filter(g => p.genre.includes(g)).length;
            genreFilms.push({ slug: s, peli: p, shared });
          }
        }
        genreFilms.sort((a, b) => b.shared - a.shared);
      }

      // Find films from the same year
      const yearFilms = [];
      if (peli.year) {
        for (const [s, p] of Object.entries(PELI_CACHE)) {
          if (p && s !== slug && p.year === peli.year) yearFilms.push({ slug: s, peli: p });
        }
      }

      let html = `<section class="main-section"><div class="container">
        ${breadcrumb([{href:'#', label:'Inicio'}, {href:'#peliculas', label:'Películas'}, {href:'#', label: orig}])}

        <div class="columns">
          <div class="column is-narrow" style="text-align:center">
      `;
      if (peli.poster) {
        html += `<img class="peli-poster-img" src="${peli.poster}" alt="${peli.titulo}">`;
      }

      html += `</div><div class="column">
        <h1 class="peli-title">${displayTitle}</h1>
      `;

      // ── Year (linked to same-year films)
      if (peli.year) {
        const yearNote = yearFilms.length ? ` <span style="font-size:.78rem;font-style:normal;font-family:var(--ff-body);color:var(--tx-3)">(${yearFilms.length} más de este año)</span>` : '';
        html += `<div style="font-family:var(--ff-display);font-style:italic;font-size:1.2rem;color:var(--tx-2);margin-bottom:.5rem">${peli.year}${yearNote}</div>`;
      }

      // ── Director (navigable link)
      if (peli.director) {
        const dirLinks = peli.director.split(', ').map(d =>
          `<a href="#director/${encodeURIComponent(d)}" style="color:var(--wine);text-decoration:none;font-weight:500">${d}</a>`
        ).join(', ');
        html += `<div style="font-size:.95rem;margin-bottom:.4rem">🎥 ${dirLinks}</div>`;
      }

      // ── Runtime
      if (peli.runtime) {
        html += `<div style="font-size:.88rem;color:var(--tx-2);margin-bottom:.5rem">🕐 ${peli.runtime}</div>`;
      }

      // ── Genres (navigable tags)
      if (genres.length) {
        html += `<div class="tags mb-3">${genres.map(g =>
          `<span class="tag is-genre" style="cursor:default">${g}</span>`
        ).join('')}</div>`;
      }

      // ── Ratings
      if (peli.imdb_id || peli.tmdb_id || peli.tmdb_rating) {
        html += `<div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem">`;
        if (peli.tmdb_rating) {
          html += `<span class="peli-rating" style="cursor:default">⭐ ${peli.tmdb_rating} / 10</span>`;
        }
        if (peli.imdb_id) {
          html += `<a class="peli-rating" href="https://www.imdb.com/title/${peli.imdb_id}" target="_blank" rel="noopener" style="background:var(--gold-bg);color:var(--gold)">IMDb ↗</a>`;
        }
        if (peli.tmdb_id) {
          html += `<a class="peli-rating" href="https://www.themoviedb.org/movie/${peli.tmdb_id}" target="_blank" rel="noopener" style="background:var(--bg-inset);color:var(--tx-2)">TMDB ↗</a>`;
        }
        html += `</div>`;
      }

      // ── Plot
      if (peli.plot) {
        html += `<article class="message is-wine mt-4"><div class="message-body">${peli.plot}</div></article>`;
      }

      // ── Traída por / En los Findes
      html += `<h2 style="font-family:var(--ff-display);font-size:1.15rem;margin-top:1.5rem;margin-bottom:.75rem">En los Findes</h2>`;
      html += `<div class="stagger">`;
      for (const [i, a] of appearances.entries()) {
        html += `<div class="card mb-3" style="--i:${i}">
          <div class="card-content" style="display:flex;align-items:center;gap:.85rem;overflow:visible">
            <div class="persona-avatar" style="width:38px;height:38px;font-size:.95rem">${a.persona.charAt(0)}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;font-size:.9rem">
                Traída por <a href="#persona/${encodeURIComponent(a.persona)}">${a.persona}</a>
              </div>
              <div style="font-size:.78rem;color:var(--tx-3)">
                <a href="#finde/${a.finde.numero}" style="color:var(--tx-3)">Finde #${a.finde.numero}</a>
                · <span style="font-family:var(--ff-display);font-style:italic">${a.finde.fecha}</span>
                · ${a.finde.lugares.map(l => `<a href="#lugar/${encodeURIComponent(l)}" style="color:var(--tx-3)">${l}</a>`).join(', ')}
              </div>
            </div>
          </div>
        </div>`;
      }
      html += `</div>`;

      // ── More by same director(s)
      for (const [director, films] of Object.entries(directorFilms)) {
        if (!films.length) continue;
        html += `<h2 style="font-family:var(--ff-display);font-size:1.15rem;margin-top:2rem;margin-bottom:.75rem">
          Más de <a href="#director/${encodeURIComponent(director)}">${director}</a>
        </h2>`;
        html += `<div class="columns is-multiline stagger">`;
        for (const [i, f] of films.slice(0, 6).entries()) {
          const t = f.peli.titulo_original || f.peli.titulo;
          const posterHtml = f.peli.poster
            ? `<img src="${f.peli.poster}" alt="" loading="lazy" style="width:40px;height:60px;object-fit:cover;border-radius:3px;flex-shrink:0">`
            : `<div style="width:40px;height:60px;background:var(--bg-inset);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.6rem">🎬</div>`;
          const yr = f.peli.year ? ` (${f.peli.year})` : '';
          const rating = f.peli.tmdb_rating ? `<span style="color:var(--gold);font-size:.72rem">⭐ ${f.peli.tmdb_rating}</span>` : '';
          html += `<div class="column is-half-tablet is-one-third-desktop" style="--i:${i}">
            <a href="#pelicula/${f.slug}" style="text-decoration:none;color:inherit">
              <div class="card" style="transition:border-color .2s">
                <div class="card-content" style="display:flex;align-items:center;gap:.7rem;padding:.75rem;overflow:visible">
                  ${posterHtml}
                  <div style="flex:1;min-width:0">
                    <div style="font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t}${yr}</div>
                    ${rating}
                  </div>
                </div>
              </div>
            </a>
          </div>`;
        }
        html += `</div>`;
        if (films.length > 6) {
          html += `<p style="font-size:.85rem"><a href="#director/${encodeURIComponent(director)}">Ver las ${films.length} películas →</a></p>`;
        }
      }

      // ── Same year
      if (yearFilms.length) {
        html += `<h2 style="font-family:var(--ff-display);font-size:1.15rem;margin-top:2rem;margin-bottom:.75rem">
          También de ${peli.year}
        </h2>`;
        html += `<div class="columns is-multiline stagger">`;
        for (const [i, f] of yearFilms.slice(0, 6).entries()) {
          const t = f.peli.titulo_original || f.peli.titulo;
          const posterHtml = f.peli.poster
            ? `<img src="${f.peli.poster}" alt="" loading="lazy" style="width:40px;height:60px;object-fit:cover;border-radius:3px;flex-shrink:0">`
            : `<div style="width:40px;height:60px;background:var(--bg-inset);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.6rem">🎬</div>`;
          const yr = f.peli.year ? ` (${f.peli.year})` : '';
          const dir = f.peli.director ? `<div style="font-size:.72rem;color:var(--tx-3)">${f.peli.director}</div>` : '';
          html += `<div class="column is-half-tablet is-one-third-desktop" style="--i:${i}">
            <a href="#pelicula/${f.slug}" style="text-decoration:none;color:inherit">
              <div class="card" style="transition:border-color .2s">
                <div class="card-content" style="display:flex;align-items:center;gap:.7rem;padding:.75rem;overflow:visible">
                  ${posterHtml}
                  <div style="flex:1;min-width:0">
                    <div style="font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t}</div>
                    ${dir}
                  </div>
                </div>
              </div>
            </a>
          </div>`;
        }
        html += `</div>`;
        if (yearFilms.length > 6) {
          html += `<p style="font-size:.85rem;color:var(--tx-3)">y ${yearFilms.length - 6} más del mismo año</p>`;
        }
      }

      // ── Related by genre
      if (genreFilms.length) {
        html += `<h2 style="font-family:var(--ff-display);font-size:1.15rem;margin-top:2rem;margin-bottom:.75rem">
          Mismo género
        </h2>`;
        html += `<div class="columns is-multiline stagger">`;
        const shown = genreFilms.filter(f =>
          !Object.values(directorFilms).flat().some(df => df.slug === f.slug) &&
          !yearFilms.some(yf => yf.slug === f.slug)
        ).slice(0, 6);
        for (const [i, f] of shown.entries()) {
          const t = f.peli.titulo_original || f.peli.titulo;
          const posterHtml = f.peli.poster
            ? `<img src="${f.peli.poster}" alt="" loading="lazy" style="width:40px;height:60px;object-fit:cover;border-radius:3px;flex-shrink:0">`
            : `<div style="width:40px;height:60px;background:var(--bg-inset);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.6rem">🎬</div>`;
          const dir = f.peli.director ? `<div style="font-size:.72rem;color:var(--tx-3)">${f.peli.director} (${f.peli.year || '?'})</div>` : '';
          html += `<div class="column is-half-tablet is-one-third-desktop" style="--i:${i}">
            <a href="#pelicula/${f.slug}" style="text-decoration:none;color:inherit">
              <div class="card" style="transition:border-color .2s">
                <div class="card-content" style="display:flex;align-items:center;gap:.7rem;padding:.75rem;overflow:visible">
                  ${posterHtml}
                  <div style="flex:1;min-width:0">
                    <div style="font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t}</div>
                    ${dir}
                  </div>
                </div>
              </div>
            </a>
          </div>`;
        }
        html += `</div>`;
      }

      html += `</div></div></div></section>`;
      document.getElementById('view').innerHTML = html;
    }

    /* ── LUGARES ── */
    function renderLugares() {
      const lugarStats = {};
      for (const f of DATA) for (const l of f.lugares) {
        if (!lugarStats[l]) lugarStats[l] = { findes: 0, pelis: 0 };
        lugarStats[l].findes += 1;
        lugarStats[l].pelis += f.personas.reduce((s, p) => s + p.peliculas.length, 0);
      }

      let html = `<section class="main-section"><div class="container">
        <h1 class="page-heading">Lugares</h1>
        <div class="stagger">
      `;
      const sorted = Object.entries(lugarStats).sort((a, b) => b[1].findes - a[1].findes);
      for (const [i, [name, s]] of sorted.entries()) {
        html += `<a href="#lugar/${encodeURIComponent(name)}" class="finde-card-link" style="--i:${i}">
          <div class="card mb-3">
            <div class="card-content" style="display:flex;align-items:center;gap:.85rem">
              <span style="font-size:1.4rem">📍</span>
              <div style="flex:1;min-width:0">
                <div style="font-weight:600;font-size:.95rem">${name}</div>
                <div style="font-size:.8rem;color:var(--tx-3)">${s.findes} findes · ${s.pelis} películas</div>
              </div>
            </div>
          </div>
        </a>`;
      }
      html += `</div></div></section>`;
      document.getElementById('view').innerHTML = html;
    }

    /* ── LUGAR DETAIL ── */
    function renderLugar(nombre) {
      const findes = DATA.filter(f => f.lugares.includes(nombre));
      const totalPelis = findes.reduce((s, f) => s + f.personas.reduce((sp, p) => sp + p.peliculas.length, 0), 0);

      let html = `<section class="main-section"><div class="container">
        ${breadcrumb([{href:'#', label:'Inicio'}, {href:'#lugares', label:'Lugares'}, {href:'#', label: nombre}])}

        <h1 class="page-heading">📍 ${nombre}</h1>
        <div class="page-sub">${findes.length} findes · ${totalPelis} películas</div>

        <div class="stagger">
      `;
      for (const [i, f] of findes.entries()) {
        const npelis = f.personas.reduce((s, p) => s + p.peliculas.length, 0);
        const participantes = f.personas.map(p =>
          `<a href="#persona/${encodeURIComponent(p.nombre)}" style="color:var(--tx-2)">${p.nombre}</a>`
        ).join(', ');
        html += `<a href="#finde/${f.numero}" class="finde-card-link" style="--i:${i}">
          <div class="card mb-3">
            <div class="card-content" style="display:flex;align-items:center;gap:.85rem">
              <span class="finde-num">${f.numero}</span>
              <div class="finde-info">
                <div class="finde-date">${f.fecha}</div>
                <div class="finde-lugar">${f.personas.map(p=>p.nombre).join(', ')}</div>
              </div>
              <span class="finde-pelis">${npelis} pelis</span>
            </div>
          </div>
        </a>`;
      }
      html += `</div></div></section>`;
      document.getElementById('view').innerHTML = html;
    }

    /* ── DIRECTORES ── */
    function getDirectorStats() {
      const directors = {};
      for (const [slug, peli] of Object.entries(PELI_CACHE)) {
        if (!peli || !peli.director) continue;
        for (const d of peli.director.split(', ')) {
          if (!directors[d]) directors[d] = { films: [], findes: new Set(), poster: null };
          directors[d].films.push({ slug, peli });
          if (!directors[d].poster && peli.poster) directors[d].poster = peli.poster;
          if (peli.findes) peli.findes.forEach(n => directors[d].findes.add(n));
        }
      }
      return directors;
    }

    function renderDirectores() {
      const directors = getDirectorStats();
      const sorted = Object.entries(directors).sort((a, b) => b[1].films.length - a[1].films.length);

      let html = `<section class="main-section"><div class="container">
        <h1 class="page-heading">Directores</h1>
        <div class="page-sub">${sorted.length} directores en el archivo</div>

        <div class="field filter-input" style="max-width:360px;margin-bottom:1.5rem">
          <div class="control">
            <input class="input" type="search" id="director-search" placeholder="Filtrar por nombre...">
          </div>
        </div>

        <div class="stagger" id="directors-list">
      `;
      for (const [i, [name, stats]] of sorted.entries()) {
        const topFilms = stats.films.slice(0, 3).map(f => {
          const t = f.peli.titulo_original || f.peli.titulo;
          const yr = f.peli.year ? ` (${f.peli.year})` : '';
          return t + yr;
        }).join(', ');
        const extra = stats.films.length > 3 ? `… y ${stats.films.length - 3} más` : '';
        html += `<a href="#director/${encodeURIComponent(name)}" class="finde-card-link" style="--i:${Math.min(i, 20)}">
          <div class="card mb-3">
            <div class="card-content" style="display:flex;align-items:center;gap:.85rem">
              <div class="persona-avatar" style="background:var(--wine-bg);color:var(--purple);font-size:1rem">🎥</div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:600;font-size:.95rem">${name} <span style="font-weight:400;font-size:.78rem;color:var(--tx-3)">· ${stats.films.length} peli${stats.films.length !== 1 ? 's' : ''}</span></div>
                <div style="font-size:.78rem;color:var(--tx-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${topFilms}${extra}</div>
              </div>
            </div>
          </div>
        </a>`;
      }
      html += `</div></div></section>`;
      document.getElementById('view').innerHTML = html;

      document.getElementById('director-search').addEventListener('input', function() {
        const q = normalize(this.value);
        for (const card of document.querySelectorAll('#directors-list .finde-card-link')) {
          card.style.display = normalize(card.textContent).includes(q) ? '' : 'none';
        }
      });
    }

    /* ── DIRECTOR DETAIL ── */
    function renderDirector(nombre) {
      const directors = getDirectorStats();
      const stats = directors[nombre];
      if (!stats) { renderDirectores(); return; }

      const films = stats.films.sort((a, b) => {
        const ya = parseInt(a.peli.year) || 9999;
        const yb = parseInt(b.peli.year) || 9999;
        return ya - yb;
      });

      // Find which personas brought these films and in which findes
      const appearances = [];
      for (const f of DATA) for (const p of f.personas) for (const m of p.peliculas) {
        if (typeof m === 'string') continue;
        const peli = PELI_CACHE[m.slug];
        if (peli && peli.director && peli.director.split(', ').includes(nombre)) {
          appearances.push({ finde: f, persona: p.nombre, slug: m.slug, peli });
        }
      }

      let html = `<section class="main-section"><div class="container">
        ${breadcrumb([{href:'#', label:'Inicio'}, {href:'#directores', label:'Directores'}, {href:'#', label: nombre}])}

        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
          <div class="persona-avatar" style="width:56px;height:56px;font-size:1.5rem;background:var(--wine-bg);color:var(--purple)">🎥</div>
          <div>
            <h1 class="page-heading" style="margin-bottom:.1rem">${nombre}</h1>
            <div class="page-sub" style="margin-bottom:0">${films.length} película${films.length !== 1 ? 's' : ''} en el archivo</div>
          </div>
        </div>

        <h2 style="font-family:var(--ff-display);font-size:1.2rem;margin-bottom:.75rem">Filmografía</h2>
        <div class="columns is-multiline stagger">
      `;
      for (const [i, { slug, peli }] of films.entries()) {
        const orig = peli.titulo_original || peli.titulo;
        const es = peli.titulo_es || peli.titulo;
        const titleDisplay = orig.toLowerCase() === es.toLowerCase()
          ? orig : `${orig} <span class="peli-es">(${es})</span>`;
        const posterHtml = peli.poster
          ? `<img src="${peli.poster}" alt="" loading="lazy" style="width:60px;height:90px;object-fit:cover;border-radius:4px">`
          : `<div style="width:60px;height:90px;background:var(--bg-inset);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.8rem">🎬</div>`;
        const rating = peli.tmdb_rating ? `<span style="color:var(--gold);font-size:.78rem">⭐ ${peli.tmdb_rating}</span>` : '';
        const genres = peli.genre ? `<div class="tags mt-2">${peli.genre.split(', ').map(g => `<span class="tag is-genre">${g}</span>`).join('')}</div>` : '';

        html += `<div class="column is-half-tablet" style="--i:${i}">
          <a href="#pelicula/${slug}" style="text-decoration:none;color:inherit">
            <div class="card">
              <div class="card-content" style="display:flex;gap:.85rem;padding:1rem">
                ${posterHtml}
                <div style="flex:1;min-width:0">
                  <div style="font-weight:600;font-size:.92rem;margin-bottom:.2rem">${titleDisplay}</div>
                  <div style="font-size:.8rem;color:var(--tx-3)">${peli.year || '?'} · ${peli.runtime || ''}</div>
                  ${rating}
                  ${genres}
                </div>
              </div>
            </div>
          </a>
        </div>`;
      }
      html += `</div>`;

      // Appearances in Findes
      html += `<h2 style="font-family:var(--ff-display);font-size:1.2rem;margin-top:2rem;margin-bottom:.75rem">En los Findes</h2>`;
      html += `<div class="menu"><ul class="menu-list">`;
      const seen = new Set();
      for (const a of appearances) {
        const key = `${a.finde.numero}-${a.slug}`;
        if (seen.has(key)) continue;
        seen.add(key);
        const orig = a.peli.titulo_original || a.peli.titulo;
        html += `<li><a href="#finde/${a.finde.numero}" style="display:flex;justify-content:space-between;align-items:center;gap:.5rem">
          <span><strong>${orig}</strong> — traída por <span style="color:var(--wine)">${a.persona}</span></span>
          <span style="color:var(--tx-3);font-size:.78rem;font-family:var(--ff-display);font-style:italic;flex-shrink:0">Finde #${a.finde.numero}</span>
        </a></li>`;
      }
      html += `</ul></div>`;

      html += `</div></section>`;
      document.getElementById('view').innerHTML = html;
    }

    /* ── Fuzzy Search Engine ── */
    let SEARCH_INDEX = [];

    function normalize(str) {
      return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    }

    function fuzzyScore(query, target) {
      const q = normalize(query), t = normalize(target);
      if (!q) return 0;
      const subIdx = t.indexOf(q);
      if (subIdx === 0) return 10000 + (1000 - t.length);
      if (subIdx > 0) return 5000 + (1000 - subIdx);
      const words = t.split(/\s+/), qWords = q.split(/\s+/);
      let wordScore = 0;
      for (const qw of qWords) for (const tw of words) {
        if (tw.startsWith(qw)) wordScore += 2000;
        else if (tw.includes(qw)) wordScore += 1000;
      }
      if (wordScore > 0) return wordScore;
      let qi = 0, consecutive = 0, score = 0, firstMatch = -1;
      for (let ti = 0; ti < t.length && qi < q.length; ti++) {
        if (t[ti] === q[qi]) {
          if (firstMatch < 0) firstMatch = ti;
          consecutive++;
          score += consecutive * 10 + (ti === 0 ? 50 : 0);
          if (ti === 0 || ' .-_'.includes(t[ti - 1])) score += 30;
          qi++;
        } else { consecutive = 0; }
      }
      if (qi < q.length) return 0;
      return score - firstMatch;
    }

    function buildSearchIndex() {
      SEARCH_INDEX = [];
      const seenDirectors = new Set(), seenSlugs = new Set();
      for (const f of DATA) for (const p of f.personas) for (const m of p.peliculas) {
        const titulo = typeof m === 'string' ? m : m.titulo;
        const slug = typeof m === 'string' ? null : m.slug;
        if (!slug || seenSlugs.has(slug)) continue;
        seenSlugs.add(slug);
        const peli = PELI_CACHE[slug];
        const searchFields = [titulo];
        let sub = `${p.nombre} · Finde #${f.numero}`;
        let poster = null;
        if (peli) {
          if (peli.titulo_original && peli.titulo_original !== titulo) searchFields.push(peli.titulo_original);
          if (peli.titulo_es && peli.titulo_es !== titulo) searchFields.push(peli.titulo_es);
          if (peli.director) { searchFields.push(peli.director); sub = `${peli.director} (${peli.year || '?'}) · ${p.nombre}`; }
          if (peli.genre) searchFields.push(peli.genre);
          if (peli.year) searchFields.push(peli.year);
          poster = peli.poster;
          if (peli.director) for (const d of peli.director.split(', ')) {
            if (!seenDirectors.has(d)) {
              seenDirectors.add(d);
              const dirPelis = [];
              for (const [s, pd] of Object.entries(PELI_CACHE)) {
                if (pd && pd.director && pd.director.includes(d)) dirPelis.push(pd.titulo);
              }
              SEARCH_INDEX.push({ type:'director', label:d, sub:`${dirPelis.length} peli${dirPelis.length>1?'s':''}: ${dirPelis.slice(0,3).join(', ')}${dirPelis.length>3?'…':''}`, search:d, href:`#director/${encodeURIComponent(d)}`, poster:null, boost:1 });
            }
          }
        }
        SEARCH_INDEX.push({ type:'pelicula', label:titulo, sub, search:searchFields.join(' '), href:`#pelicula/${slug}`, poster, boost:3 });
      }
      for (const name of [...new Set(DATA.flatMap(f => f.personas.map(p => p.nombre)))]) {
        const count = DATA.reduce((s, f) => s + (f.personas.some(p => p.nombre === name) ? 1 : 0), 0);
        SEARCH_INDEX.push({ type:'persona', label:name, sub:`${count} findes`, search:name, href:`#persona/${encodeURIComponent(name)}`, poster:null, boost:2 });
      }
      for (const l of [...new Set(DATA.flatMap(f => f.lugares))]) {
        const count = DATA.filter(f => f.lugares.includes(l)).length;
        SEARCH_INDEX.push({ type:'lugar', label:l, sub:`${count} findes`, search:l, href:`#lugar/${encodeURIComponent(l)}`, poster:null, boost:2 });
      }
      for (const f of DATA) {
        SEARCH_INDEX.push({ type:'finde', label:`Finde #${f.numero}`, sub:`${f.fecha} · ${f.lugares.join(', ')}`, search:`Finde ${f.numero} ${f.fecha} ${f.lugares.join(' ')}`, href:`#finde/${f.numero}`, poster:null, boost:1 });
      }
    }

    /* ── Search UI ── */
    let searchSelectedIdx = -1;

    function setupSearch() {
      const input = document.getElementById('global-search');
      const results = document.getElementById('search-results');
      let debounceTimer;
      input.addEventListener('input', () => { clearTimeout(debounceTimer); debounceTimer = setTimeout(() => doSearch(input.value), 80); });
      input.addEventListener('keydown', (e) => {
        const items = results.querySelectorAll('.sr-item');
        if (e.key === 'ArrowDown') { e.preventDefault(); searchSelectedIdx = Math.min(searchSelectedIdx + 1, items.length - 1); highlightItem(items); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); searchSelectedIdx = Math.max(searchSelectedIdx - 1, -1); highlightItem(items); }
        else if (e.key === 'Enter' && searchSelectedIdx >= 0 && items[searchSelectedIdx]) { e.preventDefault(); items[searchSelectedIdx].click(); }
        else if (e.key === 'Escape') { results.classList.remove('open'); input.blur(); }
      });
      document.addEventListener('click', (e) => { if (!e.target.closest('.search-wrap')) results.classList.remove('open'); });
      input.addEventListener('focus', () => { if (input.value.length >= 2) doSearch(input.value); });
    }

    function highlightItem(items) {
      items.forEach((el, i) => el.classList.toggle('selected', i === searchSelectedIdx));
      if (items[searchSelectedIdx]) items[searchSelectedIdx].scrollIntoView({ block: 'nearest' });
    }

    function doSearch(query) {
      const results = document.getElementById('search-results');
      if (query.length < 2) { results.classList.remove('open'); return; }
      const scored = new Map();
      for (const item of SEARCH_INDEX) {
        const labelScore = fuzzyScore(query, item.label) * item.boost * 2;
        const fullScore = fuzzyScore(query, item.search) * item.boost;
        const score = Math.max(labelScore, fullScore);
        if (score > 0) {
          const existing = scored.get(item.href);
          if (!existing || score > existing.score) scored.set(item.href, { ...item, score });
        }
      }
      const matches = [...scored.values()].sort((a, b) => b.score - a.score).slice(0, 15);
      searchSelectedIdx = -1;
      if (matches.length === 0) {
        results.innerHTML = '<div style="padding:.85rem;color:var(--tx-3);font-size:.88rem">Sin resultados</div>';
        results.classList.add('open');
        return;
      }
      results.innerHTML = matches.map((m, i) => {
        const posterHtml = m.poster
          ? `<img src="${m.poster}" alt="" loading="lazy">`
          : `<div class="sr-placeholder">${{pelicula:'🎬',persona:'👤',lugar:'📍',finde:'📅',director:'🎥'}[m.type]||'•'}</div>`;
        return `<div class="sr-item" data-href="${m.href}" data-idx="${i}">
          ${posterHtml}
          <div class="sr-text"><div class="sr-title">${highlightMatch(m.label, query)}</div><div class="sr-sub">${m.sub}</div></div>
          <span class="sr-type ${m.type}">${m.type}</span>
        </div>`;
      }).join('');
      results.classList.add('open');
      results.querySelectorAll('.sr-item').forEach(el => {
        el.addEventListener('click', () => { location.hash = el.dataset.href; results.classList.remove('open'); document.getElementById('global-search').value = ''; });
      });
    }

    function highlightMatch(text, query) {
      const q = normalize(query), tNorm = normalize(text);
      const idx = tNorm.indexOf(q);
      if (idx >= 0) return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + q.length) + '</mark>' + text.slice(idx + q.length);
      let result = '', qi = 0;
      for (let i = 0; i < text.length; i++) {
        if (qi < q.length && normalize(text[i]) === q[qi]) { result += '<mark>' + text[i] + '</mark>'; qi++; }
        else result += text[i];
      }
      return result;
    }

    init();
  </script>
